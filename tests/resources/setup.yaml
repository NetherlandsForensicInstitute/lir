output_path: output/${timestamp}_specific_source

data: &data
  provider:
    method: synthesized_normal_binary
    seed: 42
    h1:
      mean: 1
      std: 1
      size: 100
    h2:
      mean: -1
      std: 1
      size: 100

  splits:
    strategy: train_test_instances
    test_size: 0.5

lrsystem: &lrsystem
  architecture: specific_source
  modules:
    steps:
      clf: logistic_regression
      to_llr: probabilities_to_logodds

experiments:
  - name: exp1
    strategy: grid
    lrsystem: *lrsystem
    data: *data
    lrsystem_parameters:
      - path: modules.steps.clf
        options:
          - option_name: logit
            method: logistic_regression
          - option_name: svm
            method: svm
            probability: True
    output:
      - method: metrics
        columns:
        - cllr

  - name: exp2
    strategy: single_run
    lrsystem: *lrsystem
    data: *data
    output:
      - method: metrics
        columns:
        - cllr
