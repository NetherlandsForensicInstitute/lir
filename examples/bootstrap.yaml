output_path: output/${timestamp}_bootstrap

data: &data
  provider:
    method: synthesized_normal_binary
    seed: 42
    h1:
      mean: 2
      std: 1
      size: 60
    h2:
      mean: -2
      std: 1
      size: 60

  splits:
    strategy: train_test_instances
    test_size: .5
    seed: 42

lrsystem:
  architecture: specific_source
  modules:
    method: bootstrap
    n_bootstraps: 400
    seed: 0
    points: data
    # n_points: 100
    steps:
      clf: logistic_calibrator
      bounding: identity
        
experiments:
  - name: model_selection
    strategy: grid
    lrsystem_parameters:
      - path: modules.steps.bounding
        options:
          - identity
          - iv_bounder
    lrsystem: ${lrsystem}
    data: *data
    output:
      - method: metrics
        columns:
        - cllr
        - cllr_min
        - cllr_cal
      - pav
      - llr_interval
      - lr_histogram
