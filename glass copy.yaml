output_path: output/${timestamp}_glass_example

data: &data
  provider:
    method: parse_features_from_csv_file

  splits:
    strategy: leave_one_source_out


score_based_lrsystem: &score_based_lrsystem
  architecture: score_based

  preprocessing:

  pairing:
    method: source_pairs

  comparing:
    steps:
      scoring: my_cool_ml_model.MyModel  # This is our model!
      clf: logistic_regression  # use scikit-learn `LogisticRegression` to estimate probabilities
      to_llr: probabilities_to_logodds  # convert probabilities to their log-odds values
      calibration:  # calibrate the log-odds to LLRs using KDE
        method: kde
        bandwidth: silverman
      bounding: elub_bounder  # prevent excessive extrapolation by applying an LLR bounder


experiments:
  - name: validation
    strategy: single_run
    lrsystem: *score_based_lrsystem
    data: *data
    output:
      - metrics # cllr, cllr_min, cllr_cal
      - pav
      - ece
      - save_model

  - name: model_selection
    strategy: grid  # use a grid search
    enable_parallelization: True  # enable executing multiple runs in parallel
    lrsystem: *score_based_lrsystem  # refer to the previously defined `score_based_lrsystem`
    data: *data  # refer to the previously defined data

    lrsystem_parameters:
      - name: clf
        options:
          - option_name: svm_and_kde
            substitutions:
              - path: comparing.steps.clf
                value:
                  method: svm
                  probability: True
              - path: comparing.steps.calibration
                value:
                  method: kde
                  bandwidth: silverman
          - option_name: logit
            substitutions:
              - path: comparing.steps.clf
                value: logistic_regression
              - path: comparing.steps.calibration
                value: identity
    output:
      - method: metrics
        columns:
        - cllr
        - cllr_min
        - cllr_cal
      - pav
      - ece
