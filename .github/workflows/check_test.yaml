name: Test package

on:
  push:
    branches: ['main']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Linting, formatting, static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: '3.12'
          cache: true
          cache-dependency-path: 'pdm.lock'
      - name: Check lock file
        run: pdm lock --check
      - name: Install necessary dependencies
        run: pdm sync --group dev
      - name: Run checks
        run: pdm run check
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: check
    strategy:
      matrix:
        python-version: ['3.12', '3.14']  # Check oldest and newest python version
    steps:
      - uses: actions/checkout@v5
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: true
          cache-dependency-path: 'pdm.lock'
      - name: Install necessary dependencies
        run: pdm sync --group dev
      - name: Run tests
        run: pdm run test
  compare-benchmarks:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: '3.14'
          cache: true
          cache-dependency-path: 'pdm.lock'
      - name: Install necessary dependencies
        run: pdm sync --group dev
      - uses: actions/download-artifact@v5
        with:
          pattern: benchmarks-*
          path: .benchmarks/
          merge-multiple: true
      - name: Compare benchmarks
        run: pdm run python .github/compare-benchmarks.py --old ${{ github.event.pull_request.base.sha }} --new ${{ github.sha }} --comment-file ./BENCHMARK_COMMENT
      - uses: edumserrano/find-create-or-update-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: '<!-- compare-benchmarks.py -->'
          comment-author: 'github-actions[bot]'
          edit-mode: replace
          body-path: './BENCHMARK_COMMENT'