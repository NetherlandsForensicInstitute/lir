lrsystem_architectures:
  specific_source: lir.config.lrsystem_architectures.specific_source
  score_based: lir.config.lrsystem_architectures.score_based
  two_level: lir.config.lrsystem_architectures.two_level
experiment_strategies:
  single_run: lir.config.experiment_strategies.SingleRunStrategy
  grid: lir.config.experiment_strategies.GridStrategy
  optuna: lir.config.experiment_strategies.OptunaStrategy
data_strategies:
  train_test: lir.data_strategies.TrainTestSplit
  cross_validation: lir.data_strategies.CrossValidation
  train_test_sources: lir.data_strategies.SourcesTrainTestSplit
  cross_validation_sources: lir.data_strategies.SourcesCrossValidation
  predefined_train_test: lir.data_strategies.PredefinedTrainTestSplit
  predefined_cross_validation: lir.data_strategies.PredefinedCrossValidation
  train_test_pairs: lir.data_strategies.PairsTrainTestSplit
data_providers:
  synthesized_normal_binary: lir.datasets.synthesized_normal_binary.synthesized_normal_binary
  synthesized_normal_multiclass: lir.datasets.synthesized_normal_multiclass.synthesized_normal_multiclass
  glass: lir.datasets.glass.GlassData
  parse_features_from_csv_file: lir.datasets.feature_data_csv.feature_data_csv_file_parser
  parse_features_from_csv_url: lir.datasets.feature_data_csv.feature_data_csv_http_parser
modules:
  # pipelines
  pipeline: lir.transform.pipeline.pipeline
  logging_pipeline: lir.transform.pipeline.logging_pipeline
  bootstrap: lir.algorithms.bootstraps.bootstrap

  # transformations
  standard_scaler: sklearn.preprocessing.StandardScaler
  probabilities_to_odds: lir.util.probability_to_odds
  probabilities_to_logodds: lir.util.probability_to_logodds

  # comparisons
  element_wise_difference: lir.transform.distance.ElementWiseDifference
  euclidean_distance: lir.transform.distance.EuclideanDistance
  manhattan_distance: lir.transform.distance.ManhattanDistance

  # utility modules
  tee: lir.config.util.TeeParser
  csv_writer: lir.config.transform.csv_writer
  save_features: lir.transform.save_features.SaveFeatureTransformer
  validate_feature_data_type: lir.transform.data_validator.ValidateFeatureDataType
  identity: lir.transform.Identity

  # classifiers
  logistic_regression: sklearn.linear_model.LogisticRegression
  svm: sklearn.svm.SVC

  # calibrators
  kde: lir.algorithms.kde.KDECalibrator
  isotonic_calibrator: lir.algorithms.isotonic_regression.IsotonicCalibrator
  logistic_calibrator: lir.algorithms.logistic_regression.LogitCalibrator
  mcmc: lir.config.algorithms.mcmc

  # bounders
  static_bounder: lir.bounding.StaticBounder
  elub_bounder: lir.algorithms.bayeserror.ELUBBounder
  iv_bounder: lir.algorithms.invariance_bounds.IVBounder
  n_source_bounder: lir.bounding.NSourceBounder
metric:
  cllr: lir.metrics.cllr
  cllr_min: lir.metrics.cllr_min
  cllr_cal: lir.metrics.cllr_cal
  llr_lower_bound: lir.metrics.llr_lower_bound
  llr_upper_bound: lir.metrics.llr_upper_bound
  devpav: lir.algorithms.devpav.devpav
output:
  metrics: lir.aggregation.metrics_csv
  pav: lir.aggregation.plot_pav
  ece: lir.aggregation.plot_ece
  lr_histogram: lir.aggregation.plot_lr_histogram
  llr_interval: lir.aggregation.plot_llr_interval
  llr_overestimation: lir.aggregation.plot_llr_overestimation
  nbe: lir.aggregation.plot_nbe
  invariance_delta_function: lir.aggregation.plot_invariance_delta_function
  tippett: lir.aggregation.plot_tippett
  score_to_llr: lir.aggregation.plot_score_to_llr
  score_distribution: lir.aggregation.plot_score_distribution
  save_model: lir.persistence.parse_save_model
  case_llr: lir.aggregation.case_llr_csv
  by_category: lir.config.aggregation.subset_aggregation
  
pairing:
  instance_pairs: lir.transform.pairing.InstancePairing
  source_pairs: lir.transform.pairing.SourcePairing
hyperparameter_types:
  categorical: lir.config.substitution.parse_categorical
  cluster: lir.config.substitution.parse_clustered
  constant: lir.config.substitution.parse_constant
  float: lir.config.substitution.parse_float
  folder: lir.config.substitution.parse_folder